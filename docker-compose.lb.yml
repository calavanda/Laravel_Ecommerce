services:
  # ===================================================================
  # PC 1 – Load Balancer: Nginx + Cloudflare Tunnel
  # Instrucciones:
  #   1. Crear tu tunnel en Cloudflare y copiar el token en el .env de PC1
  #   2. docker compose -f docker-compose.lb.yml up -d
  # ===================================================================

  nginx-lb:
    image: nginx:1.25-alpine
    container_name: nginx-load-balancer
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.lb.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health-check"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok-tunnel
    command: "http nginx-lb:80"
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - nginx-lb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

