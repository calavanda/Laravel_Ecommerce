user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logs con info del upstream (útil para depurar balanceo)
    log_format lb_log '$remote_addr - [$time_local] "$request" '
                      '$status $body_bytes_sent '
                      '"$http_user_agent" '
                      'upstream=$upstream_addr rt=$upstream_response_time';

    access_log /var/log/nginx/access.log lb_log;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;
    client_max_body_size 64M;

    gzip on;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # =========================================================
    # UPSTREAM – App Servers (PC2 y PC3)
    # Cambia las IPs por las reales de tu red local.
    # =========================================================
    upstream laravel_backend {
        least_conn;   # Envía al que tenga menos conexiones activas

        server 192.168.1.102:8080 max_fails=3 fail_timeout=15s;  # PC2 (App principal)
        server 192.168.1.103:8080 max_fails=3 fail_timeout=15s backup;  # PC3 (Failover)

        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        # ── Health Check del Load Balancer (para Cloudflare) ──
        location /health-check {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'OK';
        }

        # ── Proxy hacia los App Servers ────────────────────────
        location / {
            proxy_pass         http://laravel_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   Host             $http_host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Si el app server está caído, reintenta en el siguiente
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }
}
