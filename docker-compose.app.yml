services:
  # ===================================================================
  # PC 2 / PC 3 – Servidor de Aplicación Laravel
  # Usar la MISMA imagen en ambas PCs. Solo cambia la variable APP_INSTANCE.
  # Instrucciones:
  #   - En PC2: docker compose -f docker-compose.app.yml up -d
  #   - En PC3: docker compose -f docker-compose.app.yml up -d
  # ===================================================================
  laravel-app:
    image: ${DOCKER_IMAGE:-ecommerce-laravel:latest}
    container_name: laravel-app
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      # ─── Aplicación ───────────────────────────────────────────────
      APP_NAME: "EliteShop"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-https://tu-dominio.com}

      # ─── Base de Datos (PC 4) ─────────────────────────────────────
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-192.168.1.104}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-scrum_proyecto_db}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-admin}

      # ─── Redis (PC 4) ─────────────────────────────────────────────
      REDIS_CLIENT: phpredis
      REDIS_HOST: ${REDIS_HOST:-192.168.1.104}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}

      # ─── CRÍTICO: Sesiones en Redis (compartido entre PC2 y PC3) ──
      SESSION_DRIVER: redis
      SESSION_LIFETIME: "120"
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis

      # ─── Clerk Auth ───────────────────────────────────────────────
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
      CLERK_ADMIN_EMAILS: ${CLERK_ADMIN_EMAILS:-22610282@utgz.edu.mx,admin@admin.com}

      # ─── Logs ─────────────────────────────────────────────────────
      LOG_CHANNEL: stack
      LOG_LEVEL: error

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
